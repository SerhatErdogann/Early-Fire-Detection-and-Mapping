<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Multimodal Fire Detection Dashboard</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --text-color: #f8fafc;
            --accent-glow: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        #sidebar {
            width: 320px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 1000;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
            animation: pulse 2s infinite;
        }

        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Stat Cards */
        .stat-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .stat-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .stat-value.danger {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }

        /* Map Container */
        #map {
            flex-grow: 1;
            height: 100%;
            background: #000;
        }

        /* Loading Overlay */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(0.95);
                opacity: 0.8;
            }
        }

        /* Custom Leaflet Dark Popup */
        .leaflet-popup-content-wrapper {
            background: var(--panel-bg);
            color: #fff;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            border-radius: 8px;
        }

        .leaflet-popup-tip {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h1>Fire AI Radar</h1>
        <div class="subtitle">Real-time drone monitoring & environmental risk integration.</div>

        <div class="stat-card">
            <div class="stat-title">Total Scanned Frames</div>
            <div class="stat-value" id="val-total">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Fire Detected Frames</div>
            <div class="stat-value danger" id="val-fire">--</div>
        </div>

        <div class="stat-card">
            <div class="stat-title">Max Fire Probability</div>
            <div class="stat-value" id="val-max">--%</div>
        </div>

        <div style="flex-grow:1;"></div>
        <div style="font-size: 11px; color: #64748b; text-align: center;">
            Powered by PostGIS & GeoServer
        </div>
    </div>

    <div id="map"></div>
    <div id="loader">Syncing telemetry data...</div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Haritayi Olustur (Dark Mode Basemap)
        const map = L.map('map', {
            zoomControl: false,
            maxZoom: 19
        }).setView([0, 0], 2);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // OpenStreetMap Altligi
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);

        // 2. GeoServer'dan WMS Katmanini Ekle
        // UYARI: Eger geoserver portu farkliysa (orn 8080) asagidaki linki degistirmelisin
        const geoserverLayer = L.tileLayer.wms('http://localhost:8081/geoserver/benim_projem/wms', {
            layers: 'benim_projem:yangin_tahminleri',
            format: 'image/png',
            transparent: true,
            version: '1.1.0',
            maxZoom: 20
        });
        geoserverLayer.addTo(map);

        // 3. Etkilesimli Yangin Noktalari (GeoJSON ile)
        let fireGeoJSONLayer = L.geoJSON(null, {
            pointToLayer: function (feature, latlng) {
                // Kirmizi, parlayan ozel bir marker olustur
                return L.circleMarker(latlng, {
                    radius: 8,
                    fillColor: "#ef4444",
                    color: "#b91c1c",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8,
                    className: 'pulse-marker' // css ile animasyon eklenebilir
                });
            },
            onEachFeature: function (feature, layer) {
                // Her nokta icin Hover/Click oldugunda acilacak olan HTML icerigi
                const props = feature.properties;
                const imgUrl = props.resim_adi ? `/frames/${props.resim_adi}` : '';

                const popupContent = `
                    <div style="text-align:center; min-width: 220px;">
                        ${imgUrl ? `<img src="${imgUrl}" style="width: 100%; border-radius: 8px; border: 1px solid #334155; margin-bottom: 10px;" alt="Fire Frame">` : '<div style="padding:20px; color:#94a3b8;">Goruntu Yok</div>'}
                        <div style="font-size: 14px;"><strong>Risk Skoru:</strong> %${props.yangin_yuzdesi}</div>
                        <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">${props.zaman}</div>
                    </div>
                `;
                layer.bindPopup(popupContent, { maxWidth: 300, className: 'custom-popup' });

                // Fare uzerine gelince otomatik acilsin istersen (Hover):
                layer.on('mouseover', function (e) {
                    this.openPopup();
                });
                // Tıklanabilir kalsın dersen mouseout eklemeyebilirsin veya ekleyebilirsin
            }
        }).addTo(map);

        // 4. Veritabanindan Istatistikleri ve Dinamik Lokasyonu Cek
        let lastFrameCount = -1;
        let isFirstLoad = true;

        function updateDashboard() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loader').style.display = 'none';

                    if (data.status === 'success') {
                        // Sadece eger yeni bir veri geldiyse arayuzu ve haritayi guncelle
                        if (lastFrameCount !== data.stats.toplam) {
                            lastFrameCount = data.stats.toplam;

                            // Paneli Guncelle
                            document.getElementById('val-total').innerText = data.stats.toplam;
                            document.getElementById('val-fire').innerText = data.stats.yangin;
                            document.getElementById('val-max').innerText = data.stats.max_yuzde + '%';

                            // GeoServer'dan gelen harita resmini tazelemeye zorla (Sari/Normal noktalar icin)
                            geoserverLayer.setParams({ _t: Date.now() }, false);

                            // Etkilesimli Yangin resimlerini getir
                            fetch('/api/fire-points')
                                .then(r => r.json())
                                .then(geojson => {
                                    fireGeoJSONLayer.clearLayers();
                                    fireGeoJSONLayer.addData(geojson);
                                });

                            // Haritayi ilk yuklemede noktalara odaklar
                            if (isFirstLoad) {
                                const bounds = L.latLngBounds(data.bounds[0], data.bounds[1]);
                                map.fitBounds(bounds, { padding: [50, 50], maxZoom: 18 });
                                isFirstLoad = false;
                            }
                        }
                    } else {
                        console.error("Veri alinamadi:", data.message);
                    }
                })
                .catch(err => {
                    console.error("Fetch Hatasi:", err);
                    if (isFirstLoad) {
                        document.getElementById('loader').innerText = "Baglanti hatasi!";
                    }
                });
        }

        // Ilk yuklemeyi hemen yap
        updateDashboard();

        // Her 2 saniyede bir arka planda sessizce yeni veri var mi diye kontrol et
        setInterval(updateDashboard, 2000);
    </script>
</body>

</html>
